# Build and publish provider binaries on tag push.
# Uploads to both GitHub Releases and S3 for Terraform filesystem mirror.
name: release
on:
  push:
    tags:
      - 'v*'
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::861276082564:role/prod-github-actions
          aws-region: us-east-1

      - name: Upload to S3 filesystem mirror
        run: |
          MIRROR_PATH="s3://surfai-terraform-modules/providers/registry.terraform.io/cyrilgdn/postgresql"
          for f in dist/terraform-provider-postgresql_*.zip; do
            aws s3 cp "$f" "${MIRROR_PATH}/$(basename "$f")"
          done
          if [ -f dist/terraform-provider-postgresql_*_SHA256SUMS ]; then
            aws s3 cp dist/terraform-provider-postgresql_*_SHA256SUMS "${MIRROR_PATH}/"
          fi
